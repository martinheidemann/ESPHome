substitutions:
  devicename: ${name}-${id}
  sensorname: ${name}_${id}

esphome:
  name: $devicename
  friendly_name: Powerplug ${id}
  comment: $comment

esp8266:
  board: esp01_1m

sensor:
  # total_daily_energy fjernet - bruger nu hlw8012 built-in energy sensor i stedet

  - platform: hlw8012
    sel_pin:
      number: GPIO12
      inverted: True
    cf_pin: GPIO04
    cf1_pin: GPIO05
    initial_mode: VOLTAGE
    #change_mode_every: 4294967295
    update_interval: 10s
    # sensor som bliver eksponeret  til ha

    voltage:
      id: "${sensorname}_volt_org"
      unit_of_measurement: V
      accuracy_decimals: 5
      internal: true

      on_value:
        then:
          - component.update: ${sensorname}_volt

    energy:
      name: Total daily energy
      id: ${sensorname}_total_daily_energy
      unit_of_measurement: kWh
      accuracy_decimals: 3
      state_class: total_increasing
      device_class: energy
      filters:
        - multiply: 0.001 # Wh -> kWh
        - delta: 0.001    # Only send on changes of 0.001 kWh

    power:
      id: "${sensorname}_watt_org"
      unit_of_measurement: W
      accuracy_decimals: 5
      internal: true
      filters:
        # Glat over 3 målinger for at undgå spikes fra HLW8012 ved belastningsskift
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
        # Kassér urealistisk høje værdier (mere end 3700W = 16A ved 230V)
        - lambda: if (x > 3700) return {}; else return x;

      on_value:
        then:
          - component.update: ${sensorname}_watt

    current:
      id: "${sensorname}_amp_org"
      unit_of_measurement: A
      accuracy_decimals: 5
      internal: true

      on_value:
        then:
          - component.update: ${sensorname}_amp

  - platform: template
    name: Voltage
    id: "${sensorname}_volt"
    unit_of_measurement: V
    device_class: voltage
    state_class: measurement
    accuracy_decimals: 1

    lambda: |-
      return (id(${sensorname}_volt_org).state);
    filters:
      # Map from sensor -> measured value
      - calibrate_linear:
          - ${v1_in} -> ${v1_out}
          - ${v2_in} -> ${v2_out}
          - ${v3_in} -> ${v3_out}
          - ${v4_in} -> ${v4_out}
          - ${v5_in} -> ${v5_out}
          - ${v6_in} -> ${v6_out}
      - delta: 0.5 # Only send on changes of 0.5V

  - platform: template
    name: Power
    id: "${sensorname}_watt"
    unit_of_measurement: W
    state_class: measurement
    device_class: power
    accuracy_decimals: 0

    lambda: |-
      return (id(${sensorname}_watt_org).state);
    filters:
      #Map from sensor -> measured value
      - calibrate_linear:
          - ${w1_in} -> ${w1_out}
          - ${w2_in} -> ${w2_out}
          - ${w3_in} -> ${w3_out}
          - ${w4_in} -> ${w4_out}
      - delta: 2.0 # Only send on changes of 2W

      # Make everything below 2W appear as just 0W.
      # Furthermore it corrects ~2.0W for the power usage of the plug.
      - lambda: if (x < 2) return 0; else return (x - 2);

  - platform: template
    name: Current
    id: "${sensorname}_amp"
    unit_of_measurement: A
    device_class: current
    state_class: measurement
    accuracy_decimals: 3

    lambda: |-
      return(id(${sensorname}_amp_org).state);
    filters:
      # Map from sensor -> measured value
      - calibrate_linear:
          - ${a1_in} -> ${a1_out}
          - ${a2_in} -> ${a2_out}
          - ${a3_in} -> ${a3_out}
          - ${a4_in} -> ${a4_out}
      - delta: 0.01 # Only send on changes of 0.01A

      # Make everything below 0.01A appear as just 0A.
      # Furthermore it corrects 0.01A for the power usage of the plug.
      - lambda: if (x < 0.010) return 0; else return (x - 0.010);
