# YAML SOURCE LOCATION:
# https://github.com/smarthomeshop/watermeterkit/blob/main/watermeterkit.yaml

#Name of device
substitutions:
  device_name: watermeterkit
  sensorname: watermeterkit
  friendly_name: WaterMeterKit
  comment: Measuring water consumption in real-time
  watermeterkit_software_version: "V1.1"
  watermeterkit_hardware_version: "V2"

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

  project:
    name: "smarthomeshop.watermeterkit"
    version: ${watermeterkit_software_version}

esp8266:
  board: esp01_1m
  restore_from_flash: true

dashboard_import:
  package_import_url: github://smarthomeshop/watermeterkit/watermeterkit.yaml@main

globals:
  - id: water_total_l
    type: uint32_t
    restore_value: yes
    initial_value: '0'

  - id: event_quantity
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: last_event_quantity
    type: uint32_t
    restore_value: no
    initial_value: '0'
  - id: event_counter
    type: int
    restore_value: no
    initial_value: '0'
  - id: current_event_quantity
    type: uint32_t
    restore_value: no
    initial_value: '0'


# Status LED of ESP
status_led:
  pin: GPIO12

# Switch to restart the watermeter
switch:
  - platform: restart
    id: switch_restart
    name: "Restart"

# I²C Bus
#
# This component sets up the I²C bus for the ESP8266.
#
# https://esphome.io/components/i2c.html
#
i2c:
  sda: GPIO04
  scl: GPIO05

#LED for measure status
output:
  - platform: esp8266_pwm
    id: output_led_green
    pin: GPIO14
  - platform: esp8266_pwm
    id: output_led_blue
    pin: GPIO16
light:
  - platform: monochromatic
    id: light_led_green
    output: output_led_green
  - platform: monochromatic
    id: light_led_blue
    output: output_led_blue
  
sensor:
  
  #Pulse meter part
  - platform: pulse_counter
    id: sensor_pulse_counter
    name: Current Usage
    icon: "mdi:water-pump"
    pin:
      number: GPIO13
      mode: INPUT_PULLUP
    unit_of_measurement: "L/min"
    accuracy_decimals: 1
    update_interval: 10s
    filters:
      # pulses/min -> liter/min (1 puls = 1 liter)
      - multiply: 1.0

    # ✅ Tæl pulser og gem total i flash
    on_raw_value:
      then:
        - lambda: |-
            // x = pulser i dette update_interval (råt)
            // Konverter til liter (1 puls = 1 liter)
            const uint32_t liters = (uint32_t) roundf(x);

            id(water_total_l) += liters;
            id(event_quantity) += liters;

        - light.turn_on:
            id: light_led_green
            flash_length: 1s



  - platform: template
    id: sensor_total_consumption_l
    name: Total Consumption
    icon: "mdi:cube-outline"
    unit_of_measurement: "L"
    device_class: water
    state_class: total_increasing
    accuracy_decimals: 0
    lambda: |-
      return (float) id(water_total_l);

  - platform: template
    id: sensor_total_consumption_m3
    name: Total Consumption (m³)
    icon: "mdi:cube-outline"
    unit_of_measurement: "m³"
    device_class: water
    state_class: total_increasing
    accuracy_decimals: 3
    lambda: |-
      return id(water_total_l) / 1000.0;

  - platform: template
    id: current_water_consumption
    name: Current water usage
    unit_of_measurement: "L"
    accuracy_decimals: 0
    icon: "mdi:water"

  - platform: template
    id: last_water_consumption
    name: Last water usage
    unit_of_measurement: "L"
    accuracy_decimals: 0
    icon: "mdi:water"

  #HDC1080 temp & hum sensor
  - platform: hdc1080
    temperature:
      id: sensor_temperature
      name: Temperature
      filters:
        - offset: -5.5
    humidity:
      id: sensor_humidity
      name: Humidity
      filters:
        - offset: 12
    update_interval: 60s
    
text_sensor:
  - platform: template
    id: text_sensor_watermeterkit_version
    name: Software version
    update_interval: 5h
    lambda: |-
      return {"${watermeterkit_software_version}"};
  - platform: template
    id: text_sensor_watermeterkit_hardware_version
    name: Hardware version
    update_interval: 5h
    lambda: |-
      return {"${watermeterkit_hardware_version}"};

interval:
  # Save the last consumption
  #
  # An event is published when a water flow (>= 1L / 15 seconds) is
  # detected and followed by a stop of consumption for a defined time.
  - interval: 15sec
    then:
      - lambda: |-
          if (id(event_quantity) != id(last_event_quantity)) {
            // Water continues to flow

            // Reset event counter
            id(event_counter) = 0;
          } else {
            // Water no longer flows

            if (id(event_quantity)) {
              // 4 * 15 * 5 = 5min
              if (id(event_counter) < 4 * 5) {
                // Timeout is not reaches
                id(event_counter)++;
              } else {
                  // Timeout is reaches
                  id(last_water_consumption).publish_state(id(event_quantity));

                  // Send event to Home Assistant
                  api::HomeAssistantServiceCallAction<> *api;
                  api = new api::HomeAssistantServiceCallAction<>(api_apiserver_id, true);
                  // Event id length limit is 32 characters
                  api->set_service("esphome.last_consumption_changes");
                  api->play();

                  id(event_quantity) = 0;
              }
            }
          }

          id(last_event_quantity) = id(event_quantity);

  # Track the current consumption
  - interval: 2sec
    then:
      - lambda: |-
          if (id(event_quantity) != id(current_event_quantity)) {
            id(current_water_consumption).publish_state(id(event_quantity));
          }
          id(current_event_quantity) = id(event_quantity);



packages:
  wifi: !include include/wifi.yaml
  basic: !include include/basic.yaml
  time: !include include/time.yaml